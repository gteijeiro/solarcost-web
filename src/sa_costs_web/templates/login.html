{% extends "base.html" %}
{% block title %}{{ t('Ingresar') }}{% endblock %}
{% block content %}
  <section class="auth-layout auth-layout-single">
    <article class="panel">
      <h2>{{ t('Iniciar sesion') }}</h2>
      <form method="post" class="stack-form">
        <label>
          {{ t('Usuario') }}
          <input type="text" name="username" autocomplete="username" required>
        </label>
        <label>
          {{ t('Contrasena') }}
          <input type="password" name="password" autocomplete="current-password" required>
        </label>
        <button type="submit" class="primary-button">{{ t('Entrar') }}</button>
      </form>
    </article>
  </section>
{% endblock %}
